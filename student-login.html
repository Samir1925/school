<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login – M.I Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="bg-white/20 backdrop-blur-xl rounded-3xl shadow-2xl p-10 w-full max-w-md border border-white/30">
    <div class="text-center mb-8">
      <i class="fas fa-user-graduate text-5xl text-white mb-4"></i>
      <h1 class="text-3xl font-bold text-white">Student Login</h1>
      <p class="text-purple-200 mt-2">Enter your School ID to continue</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-white text-sm font-semibold mb-1">School ID</label>
        <div class="relative">
          <i class="fas fa-id-card absolute left-3 top-1/2 -translate-y-1/2 text-purple-300"></i>
          <input type="text" id="schoolId" placeholder="e.g., GSB-2024-001" required
            class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-purple-200 outline-none focus:border-white focus:ring-2 focus:ring-white/50 transition uppercase" />
        </div>
      </div>
      <div>
        <label class="block text-white text-sm font-semibold mb-1">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-purple-300"></i>
          <input type="password" id="password" placeholder="Your password" required
            class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-purple-200 outline-none focus:border-white focus:ring-2 focus:ring-white/50 transition" />
        </div>
      </div>

      <button type="submit"
        class="w-full py-3 bg-white text-purple-700 font-bold rounded-xl shadow-lg hover:bg-purple-50 focus:outline-none focus:ring-4 focus:ring-white/40 transition transform hover:scale-[1.02] active:scale-95">
        <i class="fas fa-sign-in-alt mr-2"></i> Sign In
      </button>
    </form>

    <p id="error" class="hidden text-red-200 text-sm text-center mt-4 bg-red-500/20 rounded-lg py-2">
      <i class="fas fa-exclamation-circle mr-1"></i> Invalid School ID or password
    </p>

    <p class="text-purple-200 text-xs text-center mt-8 opacity-70">
      G Star English Boarding School • Student Portal
    </p>
  </div>

 <script type="module">
  import { auth } from "/assets/js/firebase-config.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const schoolId = document.getElementById('schoolId').value.trim().toUpperCase();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    errorEl.classList.add('hidden');

    // Convert School ID to email format
    const email = `${schoolId}@school.local`;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = '/student-dashboard.html';
    } catch (err) {
      console.error(err);
      errorEl.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
