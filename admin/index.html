<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Springdale Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl p-10 w-full max-w-md border border-white/20">
    <!-- Logo / Branding -->
    <div class="text-center mb-8">
      <i class="fas fa-shield-alt text-5xl text-white mb-4"></i>
      <h1 class="text-3xl font-bold text-white">Admin Access</h1>
      <p class="text-indigo-200 mt-2">Sign in to manage your school website</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-white text-sm font-semibold mb-1">Email</label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-indigo-300"></i>
          <input type="email" id="email" placeholder="admin@school.edu" required
            class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-indigo-200 outline-none focus:border-white focus:ring-2 focus:ring-white/50 transition" />
        </div>
      </div>
      <div>
        <label class="block text-white text-sm font-semibold mb-1">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-indigo-300"></i>
          <input type="password" id="password" placeholder="••••••••" required
            class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-indigo-200 outline-none focus:border-white focus:ring-2 focus:ring-white/50 transition" />
        </div>
      </div>

      <button type="submit"
        class="w-full py-3 bg-white text-indigo-700 font-bold rounded-xl shadow-lg hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-white/40 transition transform hover:scale-[1.02] active:scale-95">
        <i class="fas fa-sign-in-alt mr-2"></i> Sign In
      </button>
    </form>

    <p id="error" class="hidden text-red-300 text-sm text-center mt-4 bg-red-500/20 rounded-lg py-2">
      <i class="fas fa-exclamation-circle mr-1"></i> Invalid email or password
    </p>

    <p class="text-indigo-200 text-xs text-center mt-8 opacity-70">
      Protected area • Springdale International Academy
    </p>
  </div>

  <!-- Firebase + Login Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 🔥 REPLACE with your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCbTfB_VxZosV15LUdgyoUrHL6-dz6FohM",
      authDomain: "school-cf387.firebaseapp.com",
      projectId: "school-cf387",
      storageBucket: "school-cf387.firebasestorage.app",
      messagingSenderId: "594859618434",
      appId: "1:594859618434:web:065c17831015ca0073049b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const errorEl = document.getElementById('error');
      errorEl.classList.add('hidden');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // Successful login -> redirect to dashboard
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        console.error(err.code);
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
