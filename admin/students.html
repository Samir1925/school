<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students | Springdale Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .sidebar-link { transition: background 0.2s, padding-left 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); padding-left: 1.2rem; }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar (same as other admin pages, with students.html active) -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-graduation-cap"></i> Springdale</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-cog w-5"></i> Site Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-images w-5"></i> Media
        </a>
        <a href="users.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-users-cog w-5"></i> Users
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">👩‍🎓 Students</h1>
        <button onclick="openModal()" class="px-5 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl shadow hover:bg-indigo-700 transition">
          <i class="fas fa-plus mr-2"></i> Add Student
        </button>
      </div>

      <!-- Student Table -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-4">School ID</th>
              <th class="p-4">Name</th>
              <th class="p-4">Grade</th>
              <th class="p-4">Parent</th>
              <th class="p-4">Fee Status</th>
              <th class="p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" class="p-4 text-center text-gray-400">Loading students...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Student Modal -->
  <div id="studentModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto">
      <h2 class="text-xl font-bold mb-4" id="modalTitle">Add Student</h2>
      <form id="studentForm" class="space-y-4">
        <input type="hidden" id="studentId" />
        <div>
          <label class="block text-sm font-medium">Student Name</label>
          <input type="text" id="name" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>
        <div>
          <label class="block text-sm font-medium">Grade</label>
          <input type="text" id="grade" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>
        <div>
          <label class="block text-sm font-medium">Parent Name</label>
          <input type="text" id="parent" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-sm font-medium">Contact Number</label>
          <input type="tel" id="contact" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-sm font-medium">Fee Status</label>
          <select id="feeStatus" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="partial">Partial</option>
          </select>
        </div>
        <div class="flex gap-3 justify-end mt-6">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-xl text-gray-600 hover:bg-gray-100">Cancel</button>
          <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">Save</button>
        </div>
      </form>
    </div>
  </div>

<script type="module">
  import { auth, db } from "/assets/js/firebase-config.js";
  import { signOut, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { requireAdmin } from "/assets/js/admin-guard.js";

  // Guard
  const mainArea = document.querySelector('main');
  const adminUser = await requireAdmin();
  if (!adminUser) {
    mainArea.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-red-600">Access Denied</h2></div>`;
    throw new Error('Not admin');
  }

  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
    toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Generate School ID
  function generateSchoolId() {
    const year = new Date().getFullYear();
    const random = Math.floor(Math.random() * 999).toString().padStart(3, '0');
    return `GSB-${year}-${random}`;
  }

  // Load students
  async function loadStudents() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const snap = await getDocs(collection(db, 'students'));
    if (snap.empty) {
      tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-500">No students yet.</td></tr>';
      return;
    }
    snap.forEach(docSnap => {
      const s = docSnap.data();
      const row = document.createElement('tr');
      row.className = 'border-t';
      row.innerHTML = `
        <td class="p-4 font-mono font-semibold text-indigo-600">${s.schoolId || '—'}</td>
        <td class="p-4">${s.name}</td>
        <td class="p-4">${s.grade}</td>
        <td class="p-4">${s.parent_name || '—'}</td>
        <td class="p-4">
          <span class="px-2 py-1 rounded-full text-xs font-semibold ${s.feeStatus === 'paid' ? 'bg-green-100 text-green-700' : s.feeStatus === 'pending' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">
            ${s.feeStatus || 'N/A'}
          </span>
        </td>
        <td class="p-4 flex gap-2">
          <button class="text-indigo-600 edit-btn" data-id="${docSnap.id}"><i class="fas fa-edit"></i></button>
          <button class="text-red-600 delete-btn" data-id="${docSnap.id}"><i class="fas fa-trash"></i></button>
        </td>`;
      tbody.appendChild(row);
    });
    document.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', openEdit));
    document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', deleteStudent));
  }
  loadStudents();

  window.openModal = () => {
    document.getElementById('modalTitle').textContent = 'Add Student';
    document.getElementById('studentForm').reset();
    document.getElementById('studentId').value = '';
    document.getElementById('studentModal').classList.remove('hidden');
  };
  window.closeModal = () => document.getElementById('studentModal').classList.add('hidden');

  // Edit
  async function openEdit(e) {
    const id = e.currentTarget.dataset.id;
    const snap = await getDoc(doc(db, 'students', id));
    if (!snap.exists()) return;
    const s = snap.data();
    document.getElementById('studentId').value = id;
    document.getElementById('name').value = s.name || '';
    document.getElementById('grade').value = s.grade || '';
    document.getElementById('parent').value = s.parent_name || '';
    document.getElementById('contact').value = s.contact || '';
    document.getElementById('feeStatus').value = s.feeStatus || 'pending';
    document.getElementById('modalTitle').textContent = 'Edit Student';
    document.getElementById('studentModal').classList.remove('hidden');
  }

  // Delete
  async function deleteStudent(e) {
    if (!confirm('Delete this student? This will also remove their login account.')) return;
    const id = e.currentTarget.dataset.id;
    await deleteDoc(doc(db, 'students', id));
    loadStudents();
    showToast('Student deleted');
  }

  // Save
  document.getElementById('studentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('studentId').value;
    const schoolId = id ? '' : generateSchoolId();
    const name = document.getElementById('name').value;
    const grade = document.getElementById('grade').value;
    const parent_name = document.getElementById('parent').value;
    const contact = document.getElementById('contact').value;
    const feeStatus = document.getElementById('feeStatus').value;

    try {
      if (id) {
        // Update existing student
        await updateDoc(doc(db, 'students', id), {
          name, grade, parent_name, contact, feeStatus
        });
      } else {
        // Create new student with Firebase Auth
        const email = `${schoolId}@school.local`;
        const defaultPassword = contact || '12345678';

        const userCredential = await createUserWithEmailAndPassword(auth, email, defaultPassword);
        const uid = userCredential.user.uid;

        // Set display name
        await updateProfile(userCredential.user, { displayName: name });

        // Save to Firestore
        await setDoc(doc(db, 'students', uid), {
          schoolId,
          name,
          grade,
          parent_name,
          contact,
          feeStatus,
          email,
          uid,
          attendancePercentage: '95%',
          createdAt: new Date()
        });
      }
      closeModal();
      loadStudents();
      showToast(id ? 'Student updated!' : `Student created! School ID: ${schoolId}`);
    } catch (err) {
      showToast('Error: ' + err.message, true);
      console.error(err);
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/admin/index.html';
  });
</script>
</body>
</html>
