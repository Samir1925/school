<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media | <span data-setting="school_name">Springdale</span></title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .sidebar-link { transition: background 0.2s, padding-left 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); padding-left: 1.2rem; }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar (same as other admin pages) -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-graduation-cap"></i> M.I Academy</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
       <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-cog w-5"></i> Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="notes.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-book w-5"></i> Notes
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-images w-5"></i> Media
        </a>
          <a href="users.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-users-cog w-5"></i> Users
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">🖼️ Media Gallery</h1>
        <label class="px-5 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl shadow hover:bg-indigo-700 transition cursor-pointer">
          <i class="fas fa-upload mr-2"></i> Upload Image
          <input type="file" id="fileInput" accept="image/*" class="hidden" multiple />
        </label>
      </div>

      <!-- Gallery Grid -->
      <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </main>
  </div>

  <script type="module">
    import { auth, db } from "/assets/js/firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { requireAdmin } from "/assets/js/admin-guard.js";

    // 🔥 Replace with your imgbb API key
    const IMGBB_API_KEY = "7fc4e70ff7c285b2e7c0ae7d1d60c4db";

    // Guard
    const mainArea = document.querySelector('main');
    const user = await requireAdmin();
    if (!user) {
      mainArea.innerHTML = `<div class="p-8 text-center text-red-600"><h2>Access Denied</h2></div>`;
      throw new Error('Not admin');
    }

    // Toast
    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Load media from Firestore (unchanged)
    async function loadMedia() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      const snap = await getDocs(collection(db, 'media'));
      if (snap.empty) {
        gallery.innerHTML = '<p class="col-span-full text-center text-gray-500">No images yet.</p>';
        return;
      }
      snap.forEach(docSnap => {
        const m = docSnap.data();
        const div = document.createElement('div');
        div.className = 'relative group bg-white rounded-xl overflow-hidden shadow';
        div.innerHTML = `
          <img src="${m.url}" class="w-full h-32 object-cover" />
          <button class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition delete-media" data-id="${docSnap.id}"><i class="fas fa-trash"></i></button>
        `;
        gallery.appendChild(div);
      });
      document.querySelectorAll('.delete-media').forEach(b => b.addEventListener('click', async (e) => {
        if (!confirm('Delete this image?')) return;
        await deleteDoc(doc(db, 'media', e.currentTarget.dataset.id));
        loadMedia();
        showToast('Image deleted');
      }));
    }
    loadMedia();

    // Upload to imgbb and save URL
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const files = e.target.files;
      for (const file of files) {
        if (file.size > 32 * 1024 * 1024) { // imgbb max 32 MB
          showToast('File too large (max 32 MB)', true);
          continue;
        }
        const formData = new FormData();
        formData.append('image', file);

        try {
          const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
          });
          const result = await response.json();
          if (!result.success) {
            throw new Error(result.error?.message || 'Upload failed');
          }
          const imageUrl = result.data.url;
          // Save to Firestore
          await addDoc(collection(db, 'media'), {
            url: imageUrl,
            createdAt: new Date()
          });
          loadMedia();
          showToast('Image uploaded!');
        } catch (err) {
          console.error(err);
          showToast('Upload failed: ' + err.message, true);
        }
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
