<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admission Applications | Springdale Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .sidebar-link { transition: background 0.2s, padding-left 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); padding-left: 1.2rem; }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-graduation-cap"></i> Springdale</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-cog w-5"></i> Site Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-images w-5"></i> Media
        </a>
          <a href="notes.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-book w-5"></i> Users
        </a>
        <a href="users.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-users-cog w-5"></i> Users
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">📋 Admission Applications</h1>
        <span class="text-sm text-gray-500" id="appCount">0 applications</span>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-4">Student Name</th>
              <th class="p-4">Grade</th>
              <th class="p-4">Parent</th>
              <th class="p-4">Email</th>
              <th class="p-4">Date Submitted</th>
              <th class="p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" class="p-4 text-center text-gray-400">Loading applications...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { auth, db } from "/assets/js/firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { requireAdmin } from "/assets/js/admin-guard.js";

    const mainArea = document.querySelector('main');
    const user = await requireAdmin();
    if (!user) {
      mainArea.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-red-600">Access Denied</h2></div>`;
      throw new Error('Not admin');
    }

    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function loadApplications() {
      const tbody = document.getElementById('tableBody');
      const countSpan = document.getElementById('appCount');
      tbody.innerHTML = '';
      try {
        const snap = await getDocs(collection(db, 'admission_applications'));
        countSpan.textContent = `${snap.size} application(s)`;

        if (snap.empty) {
          tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-500">No applications yet.</td></tr>';
          return;
        }

        snap.forEach(docSnap => {
          const a = docSnap.data();
          const row = document.createElement('tr');
          row.className = 'border-t';
          row.innerHTML = `
            <td class="p-4">${a.studentName || a.name || '—'}</td>
            <td class="p-4">${a.grade || '—'}</td>
            <td class="p-4">${a.parentName || a.parent_name || '—'}</td>
            <td class="p-4">${a.email || '—'}</td>
            <td class="p-4">${a.submittedAt?.toDate ? new Date(a.submittedAt.toDate()).toLocaleDateString() : '—'}</td>
            <td class="p-4">
              <button class="text-red-600 delete-btn" data-id="${docSnap.id}"><i class="fas fa-trash"></i></button>
            </td>`;
          tbody.appendChild(row);
        });

        document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', async (e) => {
          if (!confirm('Delete this application?')) return;
          await deleteDoc(doc(db, 'admission_applications', e.currentTarget.dataset.id));
          loadApplications();
          showToast('Application deleted');
        }));
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">Failed to load applications.</td></tr>';
      }
    }
    loadApplications();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
