<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Settings | Springdale Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-gray-100 font-sans antialiased">

  <!-- Layout: Sidebar + Content -->
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar (same as dashboard) -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-graduation-cap"></i> Springdale</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-cog w-5"></i> Site Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-images w-5"></i> Media
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-8">⚙️ Site Settings</h1>

      <div id="toast" class="hidden fixed bottom-6 right-6 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-2 z-50">
        <i class="fas fa-check-circle"></i> Settings saved!
      </div>

      <form id="settingsForm" class="space-y-8">
        <!-- General Info -->
        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-xl font-semibold text-gray-900 mb-4">School Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">School Name</label>
              <input type="text" name="school_name" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Tagline</label>
              <input type="text" name="tagline" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Primary Color</label>
              <input type="color" name="primary_color" class="mt-1 h-10 w-16 rounded-lg border border-gray-200 cursor-pointer" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Secondary Color</label>
              <input type="color" name="secondary_color" class="mt-1 h-10 w-16 rounded-lg border border-gray-200 cursor-pointer" />
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700">Address</label>
              <input type="text" name="address" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Phone</label>
              <input type="text" name="phone" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Email</label>
              <input type="email" name="email" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700">Principal Name</label>
              <input type="text" name="principal_name" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700">Principal Message</label>
              <textarea name="principal_message" rows="3" class="mt-1 w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
            </div>
          </div>
        </section>

        <!-- Logo Upload -->
        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
          <h2 class="text-xl font-semibold text-gray-900 mb-4">Logo</h2>
          <div class="flex items-center gap-4">
            <img id="logoPreview" src="" alt="Logo" class="h-16 rounded-lg bg-gray-100 hidden" />
            <input type="file" id="logoFile" accept="image/*" class="text-sm" />
          </div>
        </section>

        <!-- Save Button -->
        <div class="flex gap-4">
          <button type="submit" class="px-8 py-3 bg-indigo-600 text-white font-semibold rounded-xl shadow hover:bg-indigo-700 transition">
            <i class="fas fa-save mr-2"></i> Save All Settings
          </button>
        </div>
      </form>
    </main>
  </div>

<script type="module">
  import { auth, db, storage } from "/assets/js/firebase-config.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { requireAdmin } from "/assets/js/admin-guard.js";

  const mainArea = document.querySelector('main');
  const user = await requireAdmin();
  if (!user) {
    mainArea.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-red-600">Access Denied</h2><p>You must be an admin to view this page.</p></div>`;
    throw new Error('Not admin');
  }

  // Toast helper
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
    toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 4000);
  }

  async function loadSettings() {
    const snap = await getDoc(doc(db, 'site_settings', 'singleton'));
    if (snap.exists()) {
      const data = snap.data();
      for (const [key, value] of Object.entries(data)) {
        const field = document.querySelector(`[name="${key}"]`);
        if (field) field.value = value;
      }
      if (data.logo_url) {
        document.getElementById('logoPreview').src = data.logo_url;
        document.getElementById('logoPreview').classList.remove('hidden');
      }
    }
  }
  loadSettings();

  document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

    try {
      const formData = new FormData(e.target);
      const settings = Object.fromEntries(formData.entries());

      const logoFile = document.getElementById('logoFile').files[0];
      if (logoFile) {
        const storageRef = ref(storage, `logos/${Date.now()}_${logoFile.name}`);
        await uploadBytes(storageRef, logoFile);
        settings.logo_url = await getDownloadURL(storageRef);
      }

      await setDoc(doc(db, 'site_settings', 'singleton'), settings, { merge: true });
      showToast('Settings saved!');
    } catch (error) {
      console.error('Save failed:', error);
      showToast('Failed to save: ' + error.message, true);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/admin/index.html';
  });
</script>
</body>
</html>
