<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teachers | Springdale Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .sidebar-link { transition: background 0.2s, padding-left 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); padding-left: 1.2rem; }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

  <!-- Layout: Sidebar + Main -->
  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (same as other admin pages) -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-graduation-cap"></i> Springdale</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
     <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-cog w-5"></i> Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="notes.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-book w-5"></i> Notes
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-images w-5"></i> Media
        </a>
      </nav>
        <a href="users.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-users-cog w-5"></i> Users
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">👩‍🏫 Teachers</h1>
        <button onclick="openModal()" class="px-5 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl shadow hover:bg-indigo-700 transition">
          <i class="fas fa-plus mr-2"></i> Add Teacher
        </button>
      </div>

      <!-- Teachers Table -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-4">Photo</th>
              <th class="p-4">Name</th>
              <th class="p-4">Subject</th>
              <th class="p-4">Email</th>
              <th class="p-4">Contact</th>
              <th class="p-4">Bio</th>
              <th class="p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="p-4 text-center text-gray-400">Loading teachers...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add / Edit Teacher Modal -->
  <div id="teacherModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
      <h2 class="text-xl font-bold mb-4" id="modalTitle">Add Teacher</h2>
      <form id="teacherForm" class="space-y-4">
        <input type="hidden" id="teacherId" />

        <div>
          <label class="block text-sm font-medium">Name</label>
          <input type="text" id="name" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>

        <div>
          <label class="block text-sm font-medium">Subject</label>
          <input type="text" id="subject" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>

        <div>
          <label class="block text-sm font-medium">Email</label>
          <input type="email" id="email" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div>
          <label class="block text-sm font-medium">Contact Number</label>
          <input type="tel" id="contact" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div>
          <label class="block text-sm font-medium">Bio</label>
          <textarea id="bio" rows="3" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
        </div>

        <!-- Profile Photo -->
        <div>
          <label class="block text-sm font-medium">Profile Photo</label>
          <div class="flex items-center gap-4 mt-2">
            <img id="photoPreview" src="" alt="Preview" class="h-16 w-16 rounded-full object-cover border-2 border-indigo-200 hidden" />
            <label class="cursor-pointer px-4 py-2 bg-indigo-100 text-indigo-700 rounded-xl hover:bg-indigo-200 transition text-sm">
              <i class="fas fa-camera mr-1"></i> Choose Photo
              <input type="file" id="photoFile" accept="image/*" class="hidden" />
            </label>
          </div>
          <!-- Option to provide URL manually -->
          <input type="url" id="photoUrl" placeholder="Or paste image URL" class="w-full mt-2 p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div class="flex gap-3 justify-end mt-6">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-xl text-gray-600 hover:bg-gray-100">Cancel</button>
          <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase + Logic -->
  <script type="module">
    import { auth, db } from "/assets/js/firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { requireAdmin } from "/assets/js/admin-guard.js";

    // imgbb API key (for photo uploads) – same as you use for media
    const IMGBB_API_KEY = "7fc4e70ff7c285b2e7c0ae7d1d60c4db"; // 🔥 Replace with your key

    const mainArea = document.querySelector('main');
    const user = await requireAdmin();
    if (!user) {
      mainArea.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-red-600">Access Denied</h2></div>`;
      throw new Error('Not admin');
    }

    // Toast
    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
      toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Load teachers from Firestore
    async function loadTeachers() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      const snap = await getDocs(collection(db, 'teachers'));
      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-500">No teachers added yet.</td></tr>';
        return;
      }
      snap.forEach(docSnap => {
        const t = docSnap.data();
        const row = document.createElement('tr');
        row.className = 'border-t';
        row.innerHTML = `
          <td class="p-4">
            <img src="${t.image || 'https://randomuser.me/api/portraits/lego/1.jpg'}" alt="${t.name}" class="w-10 h-10 rounded-full object-cover" />
          </td>
          <td class="p-4 font-medium">${t.name}</td>
          <td class="p-4">${t.subject}</td>
          <td class="p-4">${t.email || '—'}</td>
          <td class="p-4">${t.contact || '—'}</td>
          <td class="p-4">${(t.bio || '').substring(0, 50)}…</td>
          <td class="p-4 flex gap-2">
            <button class="text-indigo-600 edit-btn" data-id="${docSnap.id}"><i class="fas fa-edit"></i></button>
            <button class="text-red-600 delete-btn" data-id="${docSnap.id}"><i class="fas fa-trash"></i></button>
          </td>`;
        tbody.appendChild(row);
      });
      document.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', openEdit));
      document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', deleteTeacher));
    }
    loadTeachers();

    // Modal functions
    window.openModal = () => {
      document.getElementById('modalTitle').textContent = 'Add Teacher';
      document.getElementById('teacherForm').reset();
      document.getElementById('teacherId').value = '';
      document.getElementById('photoPreview').classList.add('hidden');
      document.getElementById('teacherModal').classList.remove('hidden');
    };
    window.closeModal = () => document.getElementById('teacherModal').classList.add('hidden');

    // Edit teacher
    async function openEdit(e) {
      const id = e.currentTarget.dataset.id;
      const snap = await getDoc(doc(db, 'teachers', id));
      if (!snap.exists()) return;
      const t = snap.data();
      document.getElementById('teacherId').value = id;
      document.getElementById('name').value = t.name || '';
      document.getElementById('subject').value = t.subject || '';
      document.getElementById('email').value = t.email || '';
      document.getElementById('contact').value = t.contact || '';
      document.getElementById('bio').value = t.bio || '';
      document.getElementById('photoUrl').value = t.image || '';
      if (t.image) {
        document.getElementById('photoPreview').src = t.image;
        document.getElementById('photoPreview').classList.remove('hidden');
      } else {
        document.getElementById('photoPreview').classList.add('hidden');
      }
      document.getElementById('modalTitle').textContent = 'Edit Teacher';
      document.getElementById('teacherModal').classList.remove('hidden');
    }

    // Delete teacher
    async function deleteTeacher(e) {
      if (!confirm('Delete this teacher?')) return;
      await deleteDoc(doc(db, 'teachers', e.currentTarget.dataset.id));
      loadTeachers();
      showToast('Teacher deleted');
    }

    // Photo preview when file selected
    document.getElementById('photoFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('photoPreview').src = ev.target.result;
          document.getElementById('photoPreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    // Form submit – save teacher
    document.getElementById('teacherForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('teacherId').value;
      const name = document.getElementById('name').value;
      const subject = document.getElementById('subject').value;
      const email = document.getElementById('email').value;
      const contact = document.getElementById('contact').value;
      const bio = document.getElementById('bio').value;

      let imageUrl = document.getElementById('photoUrl').value.trim();
      const photoFile = document.getElementById('photoFile').files[0];

      // Upload photo to imgbb if chosen
      if (photoFile) {
        const formData = new FormData();
        formData.append('image', photoFile);
        try {
          const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
          });
          const result = await res.json();
          if (result.success) {
            imageUrl = result.data.url;
          } else {
            showToast('Photo upload failed: ' + result.error.message, true);
            return;
          }
        } catch (err) {
          showToast('Photo upload error: ' + err.message, true);
          return;
        }
      }

      const teacherData = {
        name,
        subject,
        email,
        contact,
        bio,
        image: imageUrl || null
      };

      try {
        if (id) {
          await updateDoc(doc(db, 'teachers', id), teacherData);
        } else {
          await addDoc(collection(db, 'teachers'), teacherData);
        }
        closeModal();
        loadTeachers();
        showToast('Teacher saved!');
      } catch (err) {
        showToast('Error saving: ' + err.message, true);
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
