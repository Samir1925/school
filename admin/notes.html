<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Management | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .sidebar-link { transition: background 0.2s, padding-left 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); padding-left: 1.2rem; }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold"><i class="fas fa-graduation-cap"></i> M.I Academy</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-cog w-5"></i> Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="notes.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-book w-5"></i> Notes
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-images w-5"></i> Media
        </a>
          <a href="users.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-users-cog w-5"></i> Users
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">📚 Study Notes</h1>
        <button onclick="openModal()" class="px-5 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl shadow hover:bg-indigo-700 transition">
          <i class="fas fa-plus mr-2"></i> Upload Note
        </button>
      </div>

      <!-- Filter by Class -->
      <div class="mb-6 flex gap-2">
        <select id="filterGrade" class="p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">All Classes</option>
          <option value="Nursery">Nursery</option>
          <option value="LKG">LKG</option>
          <option value="UKG">UKG</option>
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4">Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6">Grade 6</option>
          <option value="7">Grade 7</option>
          <option value="8">Grade 8</option>
          <option value="9">Grade 9</option>
          <option value="10">Grade 10</option>
        </select>
        <button onclick="loadNotes()" class="px-4 py-2 bg-gray-200 rounded-xl hover:bg-gray-300 transition">
          <i class="fas fa-filter mr-1"></i> Filter
        </button>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-4">Title</th>
              <th class="p-4">Subject</th>
              <th class="p-4">Class</th>
              <th class="p-4">Section</th>
              <th class="p-4">Type</th>
              <th class="p-4">Uploaded</th>
              <th class="p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="p-4 text-center text-gray-400">Loading notes...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Upload Modal -->
  <div id="noteModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
      <h2 class="text-xl font-bold mb-4">📤 Upload Study Note</h2>
      <form id="noteForm" class="space-y-4">
        
        <!-- Title -->
        <div>
          <label class="block text-sm font-medium">Note Title *</label>
          <input type="text" id="title" placeholder="e.g., Science Chapter 5 - Force & Motion" 
            class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>

        <!-- Subject -->
        <div>
          <label class="block text-sm font-medium">Subject *</label>
          <input type="text" id="subject" placeholder="e.g., Science, Math, English" 
            class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>

        <!-- Class & Section -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium">Class / Grade *</label>
            <select id="grade" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required>
              <option value="">Select Class</option>
              <option value="Nursery">Nursery</option>
              <option value="LKG">LKG</option>
              <option value="UKG">UKG</option>
              <option value="1">Grade 1</option>
              <option value="2">Grade 2</option>
              <option value="3">Grade 3</option>
              <option value="4">Grade 4</option>
              <option value="5">Grade 5</option>
              <option value="6">Grade 6</option>
              <option value="7">Grade 7</option>
              <option value="8">Grade 8</option>
              <option value="9">Grade 9</option>
              <option value="10">Grade 10</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium">Section</label>
            <select id="section" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
              <option value="all">All Sections</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-medium">Description (optional)</label>
          <textarea id="description" rows="2" placeholder="Brief description of the notes..."
            class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
        </div>

        <!-- File Upload -->
        <div>
          <label class="block text-sm font-medium">Upload File *</label>
          <div class="mt-2 border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-indigo-400 transition cursor-pointer" id="dropZone">
            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
            <p class="text-gray-600">Drag & drop or click to browse</p>
            <p class="text-xs text-gray-400 mt-1">PDF, Images, Word, PPT (Max 32MB)</p>
            <input type="file" id="noteFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.ppt,.pptx" class="hidden" required />
            <p id="fileName" class="text-indigo-600 font-semibold mt-2 hidden"></p>
          </div>
        </div>

        <div class="flex gap-3 justify-end mt-6">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-xl text-gray-600 hover:bg-gray-100">Cancel</button>
          <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">
            <i class="fas fa-upload mr-1"></i> Upload Note
          </button>
        </div>
      </form>
    </div>
  </div>
<script type="module">
  import { auth, db, storage } from "/assets/js/firebase-config.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { collection, getDocs, addDoc, deleteDoc, doc, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { requireAdmin } from "/assets/js/admin-guard.js";

  const mainArea = document.querySelector('main');
  const adminUser = await requireAdmin();
  if (!adminUser) {
    mainArea.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-red-600">Access Denied</h2></div>`;
    throw new Error('Not admin');
  }

  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
    toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========== UPLOAD TO FIREBASE STORAGE ==========
  function uploadFile(file) {
    return new Promise((resolve, reject) => {
      const fileType = file.name.split('.').pop().toLowerCase();
      const storageRef = ref(storage, `notes/${Date.now()}_${file.name}`);
      const uploadTask = uploadBytesResumable(storageRef, file);
      
      uploadTask.on('state_changed',
        (snapshot) => {
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          showToast(`Uploading: ${Math.round(progress)}%`);
        },
        (error) => {
          console.error('Upload error:', error);
          reject(error);
        },
        async () => {
          const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
          resolve({ url: downloadURL, type: fileType });
        }
      );
    });
  }

  // ========== LOAD NOTES ==========
  async function loadNotes() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const filterGrade = document.getElementById('filterGrade')?.value || 'all';
    
    try {
      let q;
      if (filterGrade === 'all') {
        q = query(collection(db, 'notes'), orderBy('uploadedAt', 'desc'));
      } else {
        q = query(collection(db, 'notes'), where('grade', '==', filterGrade), orderBy('uploadedAt', 'desc'));
      }
      
      const snap = await getDocs(q);
      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-500">No notes uploaded yet.</td></tr>';
        return;
      }
      
      snap.forEach(docSnap => {
        const n = docSnap.data();
        const row = document.createElement('tr');
        row.className = 'border-t hover:bg-gray-50';
        row.innerHTML = `
          <td class="p-4 font-medium">${n.title}</td>
          <td class="p-4">${n.subject}</td>
          <td class="p-4">Grade ${n.grade} ${n.section !== 'all' ? '(' + n.section + ')' : ''}</td>
          <td class="p-4">
            <span class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-semibold uppercase">${n.fileType || 'file'}</span>
          </td>
          <td class="p-4 text-sm">${n.uploadedAt?.toDate ? n.uploadedAt.toDate().toLocaleDateString() : '—'}</td>
          <td class="p-4 flex gap-2">
            <a href="${n.fileUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800" title="Download">
              <i class="fas fa-download"></i>
            </a>
            <button class="text-red-600 hover:text-red-800 delete-btn" data-id="${docSnap.id}" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </td>`;
        tbody.appendChild(row);
      });
      document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', deleteNote));
    } catch (err) {
      tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-red-500">Failed to load notes.</td></tr>';
      console.error(err);
    }
  }
  loadNotes();

  window.openModal = () => {
    document.getElementById('noteForm').reset();
    document.getElementById('noteModal').classList.remove('hidden');
  };
  window.closeModal = () => document.getElementById('noteModal').classList.add('hidden');

  async function deleteNote(e) {
    if (!confirm('Delete this note?')) return;
    await deleteDoc(doc(db, 'notes', e.currentTarget.dataset.id));
    loadNotes();
    showToast('Note deleted');
  }

  // ========== HANDLE UPLOAD ==========
  document.getElementById('noteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

    const fileInput = document.getElementById('noteFile');
    const file = fileInput.files[0];
    
    if (!file) {
      showToast('Please select a file', true);
      btn.disabled = false;
      btn.innerHTML = originalText;
      return;
    }

    try {
      // Upload to Firebase Storage
      const { url, type } = await uploadFile(file);

      // Save to Firestore
      await addDoc(collection(db, 'notes'), {
        title: document.getElementById('title').value.trim(),
        subject: document.getElementById('subject').value.trim(),
        grade: document.getElementById('grade').value,
        section: document.getElementById('section').value || 'all',
        description: document.getElementById('description').value.trim(),
        fileUrl: url,
        fileType: type,
        fileName: file.name,
        uploadedBy: adminUser.email || 'Admin',
        uploadedAt: serverTimestamp()
      });

      closeModal();
      loadNotes();
      showToast('✅ Note uploaded!');
    } catch (err) {
      console.error('Error:', err);
      showToast('Error: ' + err.message, true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/admin/index.html';
  });
</script>
</body>
</html>
