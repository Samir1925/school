<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Users | M.I Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>.sidebar-link { transition: background 0.2s, padding-left 0.2s; } .sidebar-link:hover { background: rgba(255,255,255,0.1); padding-left: 1.2rem; }</style>
</head>
<body class="bg-gray-100 font-sans antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar (same) -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-indigo-700">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-graduation-cap"></i>M.I Academy</h2>
        <p class="text-indigo-300 text-xs mt-1">Admin Panel</p>
      </div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-th-large w-5"></i> Dashboard
        </a>
        <a href="settings.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-cog w-5"></i> Site Settings
        </a>
        <a href="notices.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-bullhorn w-5"></i> Notices
        </a>
        <a href="students.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-user-graduate w-5"></i> Students
        </a>
        <a href="teachers.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-chalkboard-teacher w-5"></i> Teachers
        </a>
        <a href="admissions.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-file-alt w-5"></i> Applications
        </a>
        <a href="media.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-images w-5"></i> Media
        </a>
        <a href="notes.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-indigo-200">
          <i class="fas fa-book w-5"></i> Users
        </a>
        <a href="users.html" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg bg-indigo-800">
          <i class="fas fa-users-cog w-5"></i> Users
        </a>
      </nav>
      <div class="p-4 border-t border-indigo-700">
        <button id="logoutBtn" class="sidebar-link flex items-center gap-3 py-3 px-3 rounded-lg text-red-300 w-full">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-8">👥 Admin Users</h1>
      <div class="mb-4">
        <button onclick="openModal()" class="px-5 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl shadow hover:bg-indigo-700 transition">
          <i class="fas fa-plus mr-2"></i> Add Admin
        </button>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-4">User UID</th>
              <th class="p-4">Role</th>
              <th class="p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="adminModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
      <h2 class="text-xl font-bold mb-4">Add Admin</h2>
      <form id="adminForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium">User UID (from Firebase Authentication)</label>
          <input type="text" id="uid" class="w-full p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
        </div>
        <div class="flex gap-3 justify-end mt-6">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-xl text-gray-600 hover:bg-gray-100">Cancel</button>
          <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">Add</button>
        </div>
      </form>
    </div>
  </div>

 <script type="module">
  import { auth, db, storage } from "/assets/js/firebase-config.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { requireAdmin } from "/assets/js/admin-guard.js";

  const mainArea = document.querySelector('main');
  const user = await requireAdmin();
  if (!user) {
    mainArea.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-red-600">Access Denied</h2></div>`;
    throw new Error('Not admin');
  }

  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl text-white flex items-center gap-2 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
    toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  async function loadMedia() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    const snap = await getDocs(collection(db, 'media'));
    snap.forEach(docSnap => {
      const m = docSnap.data();
      const div = document.createElement('div');
      div.className = 'relative group bg-white rounded-xl overflow-hidden shadow';
      div.innerHTML = `
        <img src="${m.url}" class="w-full h-32 object-cover" />
        <button class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition delete-media" data-id="${docSnap.id}"><i class="fas fa-trash"></i></button>`;
      gallery.appendChild(div);
    });
    document.querySelectorAll('.delete-media').forEach(b => b.addEventListener('click', async (e) => {
      if (!confirm('Delete this image?')) return;
      await deleteDoc(doc(db, 'media', e.currentTarget.dataset.id));
      loadMedia();
      showToast('Media deleted');
    }));
  }
  loadMedia();

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = e.target.files;
    for (const file of files) {
      const storageRef = ref(storage, `media/${Date.now()}_${file.name}`);
      const uploadTask = uploadBytesResumable(storageRef, file);
      uploadTask.on('state_changed',
        null,
        (error) => showToast('Upload failed: ' + error.message, true),
        async () => {
          const url = await getDownloadURL(uploadTask.snapshot.ref);
          await addDoc(collection(db, 'media'), {
            url,
            storagePath: uploadTask.snapshot.ref.fullPath,
            createdAt: new Date()
          });
          loadMedia();
          showToast('Image uploaded!');
        }
      );
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/admin/index.html';
  });
</script>
</body>
</html>
