<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Academics | Springdale</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
</head>
<body>
  <div id="navbar-container"></div>
  <section class="pt-28 pb-20 bg-white">
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-5xl font-bold text-center mb-8">Academics</h1>
      <p class="text-xl text-center text-gray-600 mb-16">Our curriculum is designed to challenge and inspire students from Grade 7 to A-Level.</p>
      <div class="grid md:grid-cols-3 gap-8">
        <div class="p-8 rounded-2xl shadow-lg hover:shadow-xl transition">
          <i class="fas fa-flask text-4xl text-indigo-600 mb-4"></i>
          <h3 class="text-2xl font-semibold mb-3">Sciences</h3>
          <p class="text-gray-600">Physics, Chemistry, Biology with modern labs.</p>
        </div>
        <div class="p-8 rounded-2xl shadow-lg hover:shadow-xl transition">
          <i class="fas fa-calculator text-4xl text-indigo-600 mb-4"></i>
          <h3 class="text-2xl font-semibold mb-3">Mathematics</h3>
          <p class="text-gray-600">Pure Math, Applied Math, and Statistics.</p>
        </div>
        <div class="p-8 rounded-2xl shadow-lg hover:shadow-xl transition">
          <i class="fas fa-book-open text-4xl text-indigo-600 mb-4"></i>
          <h3 class="text-2xl font-semibold mb-3">Humanities</h3>
          <p class="text-gray-600">History, Geography, Economics, Psychology.</p>
        </div>
      </div>
      <div class="mt-16 text-center">
        <a href="#" class="inline-block px-8 py-3 bg-indigo-600 text-white font-semibold rounded-full hover:bg-indigo-700">Download Curriculum PDF</a>
      </div>
    </div>
  </section>
  <div id="footer-container"></div>
  <script src="/assets/js/main.js"></script>
  <script>
    fetch('/assets/components/navbar.html').then(r=>r.text()).then(h=>document.getElementById('navbar-container').innerHTML=h);
    fetch('/assets/components/footer.html').then(r=>r.text()).then(h=>document.getElementById('footer-container').innerHTML=h);
  </script>
</body>
</html>
