<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Dashboard | Springdale</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/assets/css/admin.css"/>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col">
      <div class="p-6 text-center border-b border-indigo-700">
        <h2 class="text-2xl font-bold">Admin Panel</h2>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-lg bg-indigo-800"><i class="fas fa-home"></i> Dashboard</a>
        <a href="settings.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-cog"></i> Settings</a>
        <a href="notices.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-bullhorn"></i> Notices</a>
        <a href="students.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-user-graduate"></i> Students</a>
        <a href="teachers.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
        <a href="results.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-chart-bar"></i> Results</a>
        <a href="admissions.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-file-alt"></i> Applications</a>
        <a href="media.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-images"></i> Media</a>
        <a href="users.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-800"><i class="fas fa-users-cog"></i> Users</a>
        <a href="#" onclick="logout()" class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-700 mt-8"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <!-- Content -->
    <main class="flex-1 p-8 overflow-y-auto">
      <h1 class="text-3xl font-bold text-gray-900 mb-8">Dashboard Overview</h1>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl shadow"><p class="text-gray-500">Total Students</p><p class="text-3xl font-bold">1,200</p></div>
        <div class="bg-white p-6 rounded-xl shadow"><p class="text-gray-500">Teachers</p><p class="text-3xl font-bold">80</p></div>
        <div class="bg-white p-6 rounded-xl shadow"><p class="text-gray-500">Pending Applications</p><p class="text-3xl font-bold">23</p></div>
      </div>
    </main>
  </div>
  <script src="/assets/js/auth.js"></script>
  <script>
    if (!getToken()) window.location.href = '/admin/index.html';
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/admin/index.html';
    }
  </script>
</body>
</html>
