<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News & Events | Springdale International Academy</title>
  <meta name="description" content="Latest announcements from Springdale." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <!-- Navbar (same) -->

  <section class="pt-28 pb-20">
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-5xl font-bold text-center text-gray-900 mb-16">News & Events</h1>
      <div class="grid md:grid-cols-3 gap-8" id="newsGrid">
        <p class="col-span-3 text-center text-gray-500">Loading...</p>
      </div>
    </div>
  </section>

  <!-- Footer (same) -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* REPLACE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const grid = document.getElementById('newsGrid');
    try {
      const q = query(collection(db, 'notices'), orderBy('created_at', 'desc'));
      const snap = await getDocs(q);
      grid.innerHTML = '';
      snap.forEach(doc => {
        const n = doc.data();
        grid.innerHTML += `
          <div class="bg-white p-6 rounded-2xl shadow-lg fade-up">
            <p class="text-indigo-600 font-semibold">${n.date || '—'}</p>
            <h3 class="text-xl font-bold mt-2">${n.title}</h3>
            <p class="text-gray-600 mt-3">${n.description}</p>
          </div>`;
      });
      if (snap.empty) grid.innerHTML = '<p class="col-span-3 text-center text-gray-500">No news yet.</p>';
    } catch (e) {
      grid.innerHTML = '<p class="col-span-3 text-center text-gray-500">Unable to load news.</p>';
    }
  </script>

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/animations.js"></script>
</body>
</html>
