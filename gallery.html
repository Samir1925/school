<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – G Star</title>
  <link rel="icon" href="assets/logos/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .gallery-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap:20px; padding:20px 0; }
    .gallery-item { border-radius:12px; overflow:hidden; cursor:pointer; height:250px; }
    .gallery-item img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
    .gallery-item:hover img { transform:scale(1.05); }
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:9999; cursor:pointer; }
    .lightbox img { max-width:90%; max-height:90%; border-radius:12px; }
    .gallery-filters { display:flex; gap:10px; justify-content:center; margin:30px 0; flex-wrap:wrap; }
    .filter-btn { padding:8px 20px; border-radius:30px; border:1px solid var(--primary); background:transparent; color:var(--primary); cursor:pointer; }
    .filter-btn.active, .filter-btn:hover { background:var(--primary); color:white; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="logo"><img src="assets/logos/logo.png" alt="Logo"><span>G STAR</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="academics.html">Academics</a></li>
      <li><a href="admissions.html">Admissions</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <div class="container">
      <h1>Our Gallery</h1>
      <div class="gallery-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="campus">Campus</button>
        <button class="filter-btn" data-filter="events">Events</button>
        <button class="filter-btn" data-filter="sports">Sports</button>
        <button class="filter-btn" data-filter="classroom">Classroom</button>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </div>

  <footer>
    <div class="container footer-content"><p>© G STAR.</p></div>
  </footer>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏠</span><span>Home</span></a>
    <a href="about.html"><span class="icon">ℹ️</span><span>About</span></a>
    <a href="academics.html"><span class="icon">📚</span><span>Learn</span></a>
    <a href="admissions.html"><span class="icon">📝</span><span>Join</span></a>
    <a href="contact.html"><span class="icon">📞</span><span>Contact</span></a>
  </nav>

  <script src="js/main.js"></script>
  <script>
    const images = [
      { src:"https://placehold.co/600x400?text=Campus+1", alt:"Campus", category:"campus" },
      { src:"https://placehold.co/600x400?text=Event+1", alt:"Annual Day", category:"events" },
      { src:"https://placehold.co/600x400?text=Sports+1", alt:"Football", category:"sports" },
      { src:"https://placehold.co/600x400?text=Classroom", alt:"Classroom", category:"classroom" },
      { src:"https://placehold.co/600x400?text=Campus+2", alt:"Library", category:"campus" },
      { src:"https://placehold.co/600x400?text=Event+2", alt:"Science Fair", category:"events" },
    ];
    function render(filter='all'){
      const grid=document.getElementById('galleryGrid');
      const filtered=filter==='all'?images:images.filter(i=>i.category===filter);
      grid.innerHTML=filtered.map(i=>`
        <div class="gallery-item"><img src="${i.src}" alt="${i.alt}" loading="lazy"></div>
      `).join('');
      // Lightbox
      document.querySelectorAll('.gallery-item img').forEach(img=>{
        img.onclick=()=>{
          const lb=document.createElement('div'); lb.className='lightbox';
          lb.innerHTML=`<img src="${img.src}" alt="${img.alt}">`;
          document.body.appendChild(lb);
          lb.onclick=()=>lb.remove();
        };
      });
    }
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.filter);
      });
    });
    render();
  </script>
</body>
</html>
