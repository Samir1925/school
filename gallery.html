<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Springdale International Academy</title>
  <meta name="description" content="Photo gallery of Springdale's campus and events." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>
</head>
<body class="bg-white font-sans antialiased">

  <!-- Navbar (same as student-life, omit for brevity but include the same navbar code) -->

  <section class="pt-28 pb-20">
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-5xl font-bold text-center text-gray-900 mb-16">Our Gallery</h1>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="galleryGrid">
        <!-- dynamically filled -->
      </div>
    </div>
  </section>

  <!-- Footer (same) -->

  <!-- Firebase + Gallery Loading -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* REPLACE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const grid = document.getElementById('galleryGrid');
    try {
      const q = query(collection(db, 'media'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      if (!snap.empty) {
        snap.forEach(doc => {
          const data = doc.data();
          grid.innerHTML += `<div class="overflow-hidden rounded-xl shadow-lg"><img src="${data.url}" class="w-full h-48 object-cover hover:scale-105 transition" /></div>`;
        });
        return;
      }
    } catch (e) { console.warn('Firestore media load error, using placeholder gallery'); }

    // Fallback placeholder images if no media found or error
    const placeholders = [
      'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600&q=80',
      'https://images.unsplash.com/photo-1523050854058-8df90910e4f6?w=600&q=80',
      'https://images.unsplash.com/photo-1577896851231-70ef18881754?w=600&q=80',
      'https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?w=600&q=80'
    ];
    grid.innerHTML = placeholders.map(url => `<div class="overflow-hidden rounded-xl shadow-lg"><img src="${url}" class="w-full h-48 object-cover hover:scale-105 transition" /></div>`).join('');
  </script>

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/animations.js"></script>
</body>
</html>
