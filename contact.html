<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Springdale International Academy</title>
  <meta name="description" content="Get in touch with Springdale International Academy." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 font-sans antialiased">

  <!-- Navbar (same) -->

  <section class="pt-28 pb-20">
    <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-2 gap-12">
      <div>
        <h1 class="text-5xl font-bold text-gray-900 mb-8">Contact Us</h1>
        <div class="space-y-6">
          <div class="flex items-center gap-4">
            <i class="fas fa-map-marker-alt text-2xl text-indigo-600"></i>
            <div><p class="font-semibold">Address</p><p class="text-gray-600">123 Learning Lane, Knowledge City</p></div>
          </div>
          <div class="flex items-center gap-4">
            <i class="fas fa-phone text-2xl text-indigo-600"></i>
            <div><p class="font-semibold">Phone</p><p class="text-gray-600">+1 (555) 000-0000</p></div>
          </div>
          <div class="flex items-center gap-4">
            <i class="fas fa-envelope text-2xl text-indigo-600"></i>
            <div><p class="font-semibold">Email</p><p class="text-gray-600">info@school.edu</p></div>
          </div>
        </div>
        <!-- Optional map embed -->
        <div class="mt-8 rounded-xl overflow-hidden shadow">
          <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>

      <div class="bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Send a Message</h2>
        <form id="contactForm" class="space-y-6">
          <input type="text" id="name" placeholder="Your Name" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
          <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required />
          <textarea id="message" rows="4" placeholder="Your Message" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" required></textarea>
          <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition">Send Message</button>
        </form>
        <p id="formStatus" class="text-center mt-4 text-sm hidden"></p>
      </div>
    </div>
  </section>

  <!-- Footer (same) -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* REPLACE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      const status = document.getElementById('formStatus');
      try {
        await addDoc(collection(db, 'contact_messages'), {
          name, email, message,
          createdAt: serverTimestamp()
        });
        status.textContent = '✅ Message sent!';
        status.className = 'text-green-600 text-center mt-4 text-sm';
        status.classList.remove('hidden');
        e.target.reset();
      } catch (err) {
        status.textContent = '❌ Failed to send. Please try again.';
        status.className = 'text-red-600 text-center mt-4 text-sm';
        status.classList.remove('hidden');
      }
    });
  </script>

  <script src="/assets/js/main.js"></script>
</body>
</html>
