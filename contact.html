<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="assets/logos/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="logo"><img src="assets/logos/logo.png" alt="Logo"><span>G STAR</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="academics.html">Academics</a></li>
      <li><a href="admissions.html">Admissions</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <section class="container" style="padding:60px 20px;">
      <h1>Contact Us</h1>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:40px;">
        <div>
          <h3>Get in Touch</h3>
          <p>📍 Gaur-5, Nepal</p>
          <p>📞 xxxx-xxxxxx</p>
          <p>✉️ xxxx@xxxxx.edu.np</p>
          <h3>Follow Us</h3>
          <p>FB: /xxxx | IG: @xxxx</p>
          <iframe src="https://www.google.com/maps/embed?..." width="100%" height="250" style="border-radius:12px;" loading="lazy"></iframe>
        </div>
        <div>
          <h3>Send a Message</h3>
          <form id="contactForm">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message" rows="5"></textarea>
            <button type="submit" class="btn">Send Message</button>
          </form>
          <p id="formStatus"></p>
        </div>
      </div>
    </section>
  </div>

  <footer>
    <div class="container footer-content">
      <div class="footer-col"><h4>Contact</h4><p>📍 Gaur-5</p></div>
    </div>
    <p class="copyright">© G STAR.</p>
  </footer>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏠</span><span>Home</span></a>
    <a href="about.html"><span class="icon">ℹ️</span><span>About</span></a>
    <a href="academics.html"><span class="icon">📚</span><span>Learn</span></a>
    <a href="admissions.html"><span class="icon">📝</span><span>Join</span></a>
    <a href="contact.html" class="active"><span class="icon">📞</span><span>Contact</span></a>
  </nav>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', e => {
      e.preventDefault();
      document.getElementById('formStatus').textContent = 'Message sent (demo).';
    });
  </script>
</body>
</html>
