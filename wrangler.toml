# wrangler.toml – for Cloudflare Pages Functions
# Only used to define bindings (D1, R2) and env vars.
# The "pages_build_output_dir" is optional.

[[d1_databases]]
binding = "DB"
database_name = "gstar-db"
database_id = "xxxx-your-d1-id-xxxx"

[[r2_buckets]]
binding = "GALLERY"
bucket_name = "gstar-gallery"

[vars]
JWT_SECRET = "use-a-long-random-string-here"
ADMIN_EMAIL = "admin@school.edu.np"
ADMIN_PASSWORD = "yourSecurePassword123"
